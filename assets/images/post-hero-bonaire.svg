<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="bnTitle">
  <title id="bnTitle">Bonaire salt flat and reef illustration</title>
  <defs>
    <linearGradient id="bnSky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1ab4e0"/>
      <stop offset="68%" stop-color="#7dd8f0"/>
      <stop offset="100%" stop-color="#f0deb0"/>
    </linearGradient>
    <linearGradient id="bnSea" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#00c8d8"/>
      <stop offset="100%" stop-color="#006878"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#bnSky)"/>

  <!-- Sea -->
  <rect y="530" width="1600" height="370" fill="url(#bnSea)"/>

  <!-- Salt flat / shoreline band -->
  <path d="M0 568 C200 545 380 558 580 548 C780 538 1000 555 1200 545 C1380 536 1500 552 1600 548 V620 C1420 610 1200 618 980 612 C740 606 480 622 220 616 C120 613 50 610 0 608 Z" fill="#e8d4a0"/>

  <!-- Shallow salt-flat water shimmer -->
  <path d="M0 580 C280 570 560 578 840 572 C1100 566 1380 574 1600 568" stroke="#c8eef8" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M0 595 C300 588 620 595 900 589 C1150 584 1400 591 1600 585" stroke="#b8e8f5" stroke-width="2" fill="none" opacity="0.35"/>

  <!-- Coral 1 — left cluster -->
  <path d="M60 548 C64 528 72 516 82 528 C88 512 100 508 108 524 C116 510 128 516 132 538 C142 522 154 528 158 548Z" fill="#d94e28" opacity="0.82"/>
  <path d="M155 552 C158 536 165 526 172 536 C177 522 187 518 193 532 C199 520 207 525 210 546Z" fill="#c03a1e" opacity="0.72"/>

  <!-- Coral 2 — right cluster -->
  <path d="M1390 543 C1394 524 1404 512 1414 526 C1420 510 1432 506 1440 522 C1448 508 1460 514 1464 536 C1474 520 1484 525 1488 545Z" fill="#d94e28" opacity="0.82"/>
  <path d="M1482 549 C1486 533 1494 524 1502 534 C1508 521 1518 517 1524 531 C1530 520 1538 526 1541 546Z" fill="#c03a1e" opacity="0.72"/>

  <!-- Deeper water overlap -->
  <path d="M0 610 C300 596 700 605 1050 596 C1300 590 1500 600 1600 595 V900 H0Z" fill="#007888" opacity="0.48"/>

  <!-- === CACTI === -->

  <!-- Cactus A — tall, left side -->
  <!-- main column -->
  <rect x="166" y="360" width="32" height="200" rx="16" fill="#5c8c3c"/>
  <!-- arm left -->
  <rect x="118" y="402" width="50" height="28" rx="14" fill="#5c8c3c"/>
  <rect x="118" y="402" width="28" height="90" rx="14" fill="#5c8c3c"/>
  <!-- arm right -->
  <rect x="198" y="428" width="48" height="26" rx="13" fill="#5c8c3c"/>
  <rect x="220" y="428" width="26" height="80" rx="13" fill="#5c8c3c"/>
  <!-- shadow lines -->
  <line x1="178" y1="368" x2="178" y2="555" stroke="#4a7430" stroke-width="2" opacity="0.45"/>
  <line x1="190" y1="368" x2="190" y2="555" stroke="#4a7430" stroke-width="2" opacity="0.45"/>

  <!-- Cactus B — shorter, next to A -->
  <rect x="262" y="430" width="22" height="138" rx="11" fill="#4e7e34"/>
  <rect x="284" y="462" width="38" height="20" rx="10" fill="#4e7e34"/>
  <rect x="304" y="462" width="18" height="58" rx="9" fill="#4e7e34"/>

  <!-- Cactus C — right side, tall -->
  <rect x="1340" y="378" width="30" height="186" rx="15" fill="#5c8c3c"/>
  <!-- arm left -->
  <rect x="1294" y="418" width="48" height="26" rx="13" fill="#5c8c3c"/>
  <rect x="1294" y="418" width="26" height="76" rx="13" fill="#5c8c3c"/>
  <!-- arm right -->
  <rect x="1370" y="440" width="44" height="24" rx="12" fill="#5c8c3c"/>
  <rect x="1390" y="440" width="24" height="66" rx="12" fill="#5c8c3c"/>
  <line x1="1351" y1="386" x2="1351" y2="558" stroke="#4a7430" stroke-width="2" opacity="0.4"/>

  <!-- Cactus D — small, right -->
  <rect x="1430" y="450" width="20" height="118" rx="10" fill="#4e7e34"/>
  <rect x="1408" y="474" width="24" height="18" rx="9" fill="#4e7e34"/>
  <rect x="1408" y="474" width="22" height="52" rx="9" fill="#4e7e34"/>

  <!-- === FLAMINGOS === -->

  <!-- Flamingo 1 — tallest, centre-left -->
  <g transform="translate(640 440)">
    <!-- body -->
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="#e8607a" transform="rotate(-18)"/>
    <!-- neck curve: starts mid-body top, curves up and left to head -->
    <path d="M6 -16 C10 -44 6 -72 0 -90" stroke="#e8607a" stroke-width="11" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- head -->
    <ellipse cx="-1" cy="-96" rx="11" ry="9" fill="#e8607a"/>
    <!-- beak: downward kinked (flamingo-style) -->
    <path d="M7 -100 L18 -96 L14 -89" stroke="#d4a820" stroke-width="3" fill="#d4a820" stroke-linejoin="round"/>
    <!-- wing highlight -->
    <path d="M-18 -8 C-28 4 -26 14 -12 18" stroke="#d04060" stroke-width="4" fill="none" opacity="0.6"/>
    <!-- legs -->
    <line x1="-6" y1="17" x2="-10" y2="74" stroke="#e8607a" stroke-width="6" stroke-linecap="round"/>
    <line x1="8" y1="16" x2="10" y2="74" stroke="#e8607a" stroke-width="6" stroke-linecap="round"/>
    <!-- feet -->
    <path d="M-14 74 L-10 74 L-4 80 M-10 74 L-16 80" stroke="#d4a820" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M6 74 L12 74 L18 80 M12 74 L6 80" stroke="#d4a820" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Flamingo 2 — slightly behind, right of #1 -->
  <g transform="translate(740 456) scale(0.82)">
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="#da5470" transform="rotate(-14)"/>
    <path d="M8 -16 C14 -42 12 -68 20 -86" stroke="#da5470" stroke-width="11" fill="none" stroke-linecap="round"/>
    <ellipse cx="20" cy="-92" rx="11" ry="9" fill="#da5470"/>
    <path d="M27 -96 L38 -92 L33 -85" stroke="#c89a18" stroke-width="3" fill="#c89a18"/>
    <line x1="-6" y1="17" x2="-8" y2="70" stroke="#da5470" stroke-width="6" stroke-linecap="round"/>
    <line x1="8" y1="16" x2="10" y2="70" stroke="#da5470" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Flamingo 3 — small, further right -->
  <g transform="translate(840 464) scale(0.62)">
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="#e8607a" transform="rotate(-10)"/>
    <path d="M6 -15 C8 -40 4 -64 10 -80" stroke="#e8607a" stroke-width="11" fill="none" stroke-linecap="round"/>
    <ellipse cx="10" cy="-86" rx="11" ry="9" fill="#e8607a"/>
    <path d="M17 -90 L28 -86 L23 -80" stroke="#d4a820" stroke-width="3" fill="#d4a820"/>
    <line x1="-6" y1="17" x2="-8" y2="68" stroke="#e8607a" stroke-width="6" stroke-linecap="round"/>
    <line x1="8" y1="16" x2="10" y2="68" stroke="#e8607a" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Sun -->
  <circle cx="1240" cy="145" r="50" fill="#fff8d8" opacity="0.76"/>
</svg>
