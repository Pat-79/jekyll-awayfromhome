cookie_consent:
  # Master switch — set to true to enable the consent banner.
  enabled: true

  # Bump this number whenever you add a new cookie category. Returning visitors
  # will see the banner again so they can review the new category.
  version: 1

  # How long (in days) consent is stored. The lifetime renews on every visit,
  # so only visitors who don't return within this period will be asked again.
  lifetime_days: 365

  # Controls when the consent banner is automatically shown to visitors who
  # have not yet made a choice.
  #
  #   always             — show to every new visitor on every page, immediately.
  #   on_use             — show only when the page contains a consent gate (map/video
  #                        widget) OR the browser already holds essential site data
  #                        (theme, language, search cache). Visitors who have not yet
  #                        interacted with the site are not shown the banner.
  #   on_use_non_essential — show only when the page contains a non-essential consent
  #                        gate (map/video widget) AND the visitor has not yet made a
  #                        consent choice. Essential cookies (theme, language, search)
  #                        are stored silently without prompting. Use this when you
  #                        cover essential-only storage in a privacy statement rather
  #                        than through a consent banner.
  #   never              — never show the banner automatically. Visitors can still manage
  #                        their preferences on the cookies page.
  #
  banner_trigger: on_use_non_essential

  # Show an "Accept Essential" button on the banner. Clicking it accepts only
  # the required (essential) cookies and declines all optional ones, while
  # still dismissing the banner. The user can enable individual optional
  # categories later via the widget placeholder buttons or the cookies page.
  # true = shown (default), false = hidden.
  show_accept_essential: true

  # Show a "Decline All" button on the banner. Since Decline All and Accept
  # Essential are functionally identical (both grant only essential cookies),
  # showing both is redundant. Set to true only if your audience or legal
  # requirements specifically expect a rejection button on the first layer.
  # Decline All always remains available inside the Manage Cookies panel.
  # true = shown, false = hidden (default).
  show_decline_all: false

  # Which button is the default (primary) action — shown last in the row,
  # styled as the accent/primary button.
  #
  #   accept_all        — [Manage Cookies] [Accept Essential] [Accept All]
  #   accept_essential  — [Manage Cookies] [Accept All] [Accept Essential]
  #
  default_action: accept_essential

  # Cookie categories. 'id' is a slug used in code and i18n keys.
  # required: true  → always on, no consent needed, no toggle shown.
  # required: false → user must actively consent; defaults to off (opt-in).
  categories:
    - id: essential
      required: true
    - id: maps
      required: false
    - id: video
      required: false

comments:
  # Master switch for file-based comments.
  enabled: true

  # Cloudflare Worker endpoint that receives submissions.
  worker_url: https://my-comments-worker.example.com
  # Cloudflare Turnstile site key (public key).
  # NOTE: this must be a site key (for example, 0x4... or 1x0000... test key),
  # not the dummy verification token "XXXX.DUMMY.TOKEN.XXXX".
  turnstile_sitekey: 0x000000000000000000000AA

  # false: all translations share one thread via page.ref
  # true: comments are split by page.ref--lang
  per_language: false

  # Optional Gravatar rendering (privacy-sensitive; disabled by default).
  gravatar: false

  # Number of bundled fallback avatars in assets/images/avatars.
  avatar_count: 8

  # Date display format for comment timestamps in the browser.
  # Supported values: long (default), medium, short, date-only, iso.
  date_format: long

  # Locale source used for non-ISO comment date rendering.
  # page: use the page language (document lang)
  # browser: use the visitor browser locale
  # locale tag (for example nl-NL): force one locale everywhere
  #date_locale: nl-NL

gallery_widget:
  max_width: 900px
  max_height:
  show_image_caption: false
  show_image_description: false
  carousel_autoplay: 6

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

