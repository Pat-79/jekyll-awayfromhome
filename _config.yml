# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Your awesome title
email: your-email@example.com
description: >- # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://pat-79.github.io" # the base hostname & protocol for your site
twitter_username: jekyllrb
github_username:  jekyll

# Multilingual settings
lang: en   # default site language

# When true, post/page listings on non-default-language pages will include
# default-language posts that have no translation in the current language
# (identified by a missing `ref` partner). Useful as a graceful fallback
# so non-English pages don't appear empty while content is being translated.
lang_fallback: true

# Languages available on this site.
# 'code' must match the lang front-matter value and the folder name under ar/, fr/, etc.
# 'native' is shown in the language selector UI.
languages:
  - code: en
    name: English
    native: English
    short: EN
    flag: "🇬🇧"
  - code: de
    name: German
    native: Deutsch
    short: DE
    flag: "🇩🇪"
  - code: nl
    name: Dutch
    native: Nederlands
    short: NL
    flag: "🇳🇱"
  - code: ar
    name: Arabic
    native: العربية
    short: AR
    flag: "🇸🇦"

# Defaults: give every file a lang and give posts their permalink prefix.
# Order matters — later entries override earlier ones for the same file.
defaults:
  - scope: { path: "", type: "posts" }
    values:
      lang: en
      permalink: "/blog/:year-:month-:day_:title/"
  - scope: { path: "" }
    values:
      lang: en
  - scope: { path: "theme/ar" }
    values:
      lang: ar
  - scope: { path: "_posts/ar", type: "posts" }
    values:
      lang: ar
      permalink: "/ar/blog/:year-:month-:day_:title/"
  - scope: { path: "theme/nl" }
    values:
      lang: nl
  - scope: { path: "_posts/nl", type: "posts" }
    values:
      lang: nl
      permalink: "/nl/blog/:year-:month-:day_:title/"
  - scope: { path: "theme/de" }
    values:
      lang: de
  - scope: { path: "_posts/de", type: "posts" }
    values:
      lang: de
      permalink: "/de/blog/:year-:month-:day_:title/"


# Build settings
remote_theme: pat-79/jekyll-awayfromhome
theme: jekyll-awayfromhome
plugins:
  - jekyll-feed

navigation:
  - title: Home
    key: home
    url: /
    #url_ar: /ar/
  - title: About
    key: about
    url: /about/
    #url_ar: /ar/about/
  - title: Blogs
    key: blog
    url: /blog/
    #url_ar: /ar/blog/
  - title: Browse
    key: browse
    url: /browse/
    #url_ar: /ar/browse/
  - title: Search
    key: search
    url: /search/
    #url_ar: /ar/search/
  - title: Cookies
    key: cookies
    url: /cookies/
    url_nl: /nl/cookies/
    url_de: /de/cookies/
    url_ar: /ar/cookies/
brand:
  title: Away From Home
  logo: /assets/images/logo-mark.svg

default_post_image: /assets/images/default-hero.svg

home_landing:
  video_url: https://youtu.be/VIDEO_ID
  youtube_id:
  image: /assets/images/default-hero.svg
  latest_posts_limit: 9999999999
  #hls_url: /assets/streams/sample_stream.m3u8
  hls_url: https://pat-79.github.io/assets/streams/sample/sample_stream.m3u8

map_widget:
  tile_url: https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}
  #tile_url: https://{s}.openstreetmap.org/{z}/{x}/{y}.png
  tile_attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
  tile_subdomains:
  tile_max_zoom: 19
  locked: false
  scroll_wheel_zoom: false
  dragging:
  touch_zoom:
  double_click_zoom:
  box_zoom:
  keyboard:
  tile_referrer_policy: strict-origin-when-cross-origin
  tile_cross_origin:
  max_width:
  max_height:

video_widget:
  width:
  height:
  max_width:
  max_height:
  aspect_ratio: 16:9
  bare: false
  autoplay: false
  muted: false
  loop: false
  controls: true
  playsinline: true
  preload: metadata
  lazy: true
  privacy_mode: true
  referrer_policy: strict-origin-when-cross-origin
  poster: /assets/images/default-hero.svg

gallery_widget:
  max_width: 900px
  max_height:
  show_image_caption: false
  show_image_description: false
  carousel_autoplay: 6

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

social_links:
  - platform: youtube
    url: https://www.youtube.com/
  - platform: instagram
    url: https://www.instagram.com/
  - platform: github
    url: https://github.com/
  #- platform: twitter
  #  url: https://twitter.com/
  #- platform: linkedin
  #  url: https://www.linkedin.com/

sidebar:
  archive:
    enabled: true
    # Supported: 'year' | 'month-year' | 'year-month-tree'
    # mode: month-year
    mode: year-month-tree
    show_post_counts: true