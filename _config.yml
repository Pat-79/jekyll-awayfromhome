# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Your awesome title
email: your-email@example.com
description: >- # this means to ignore newlines until "baseurl:"
  Write an awesome description for your new site here. You can edit this
  line in _config.yml. It will appear in your document head meta (for
  Google search results) and in your feed.xml site description.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://pat-79.github.io" # the base hostname & protocol for your site
twitter_username: jekyllrb
github_username:  jekyll

# Multilingual settings
lang: en   # default site language

# When true, post/page listings on non-default-language pages will include
# default-language posts that have no translation in the current language
# (identified by a missing `ref` partner). Useful as a graceful fallback
# so non-English pages don't appear empty while content is being translated.
lang_fallback: true

# Languages available on this site.
# 'code' must match the lang front-matter value and the folder name under ar/, fr/, etc.
# 'native' is shown in the language selector UI.
languages:
  - code: en
    name: English
    native: English
    short: EN
    flag: "🇬🇧"
  - code: de
    name: German
    native: Deutsch
    short: DE
    flag: "🇩🇪"
  - code: nl
    name: Dutch
    native: Nederlands
    short: NL
    flag: "🇳🇱"
  - code: ar
    name: Arabic
    native: العربية
    short: AR
    flag: "🇸🇦"

# Defaults: give every file a lang and give posts their permalink prefix.
# Order matters — later entries override earlier ones for the same file.
defaults:
  - scope: { path: "", type: "posts" }
    values:
      lang: en
      permalink: "/en/blog/:year-:month-:day_:title/"
  - scope: { path: "" }
    values:
      lang: en
  - scope: { path: "theme/ar" }
    values:
      lang: ar
  - scope: { path: "_posts/ar", type: "posts" }
    values:
      lang: ar
      permalink: "/ar/blog/:year-:month-:day_:title/"
  - scope: { path: "theme/nl" }
    values:
      lang: nl
  - scope: { path: "_posts/nl", type: "posts" }
    values:
      lang: nl
      permalink: "/nl/blog/:year-:month-:day_:title/"
  - scope: { path: "theme/de" }
    values:
      lang: de
  - scope: { path: "_posts/de", type: "posts" }
    values:
      lang: de
      permalink: "/de/blog/:year-:month-:day_:title/"


